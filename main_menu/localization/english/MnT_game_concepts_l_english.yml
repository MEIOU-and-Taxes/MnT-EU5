l_english:
   game_concept_meiou_and_taxes: "MEIOU & Taxes"
   game_concept_meiou_and_taxes_desc: "MEIOU and Taxes is a total overhaul mod for Europa Universalis V that attempts to expand the base games systems for a deeper and more immersive experience."

   game_concept_court_maintenance_desc: "The court is the extended household of the [ruler|e], including all those who regularly attend on them. In the largest courts, this number can grow to many thousands, comprised of camarilla, household staff, clergy, gentry, bodyguards, harem, concubines, eunuchs, and many more roles. All these people do not come for free, and this figure represents the cost of having them around.\n\nIn [meiou_and_taxes|e], the money spent on $game_concept_court_maintenance$ translates to increased [demand|e] ([ShowGoodsName('furniture')], [ShowGoodsName('jewelry')], [ShowGoodsName('glass')], [ShowGoodsName('fine_cloth')], [ShowGoodsName('cloth')], [ShowGoodsName('leather')], [ShowGoodsName('weaponry')], [ShowGoodsName('books')] and [ShowGoodsName('paper')]) at the [market|e] where the [capital|e] is located."
   game_concept_diplomatic_maintenance_desc: "Should we ever need it, the amount of [diplomats_with_icon|e] and [diplomatic_capacity_with_icon|e] at our disposal can be increased by spending extra [gold|e].\n\nDiplomatic Spending also improves [subject_loyalty_with_icon|e].\n\nIn [meiou_and_taxes|e], 50% of the money spend on $game_concept_diplomatic_maintenance$ will be transferred to the [ShowEstateTypeName('nobles_estate')], while the rest will lead to increased [demand|e] ([ShowGoodsName('paper')] and [ShowGoodsName('jewelry')]) at the [market|e] where the [capital|e] is located."

   game_concept_MnT_epbm_estate_building_maintenance: "Estate Building Maintenance"
   game_concept_MnT_epbm_estate_building_maintenance_desc: "[estates|E] pay a share of every [building_maintenance|E] cost based on [estate_power|E]."

   game_concept_rgo_building: "RGO-building"
   game_concept_rgo_building_desc: "In [meiou_and_taxes|e] the [rgo|e]'s as found in the base game have been replaced by [buildings|e]. These RGO-buildings are in contrast to their basegame counterpart not hardcoded to be limited to one type per [location|e] and can also use different [production_methods|e]."
   
   game_concept_gross_domestic_product: "Gross Domestic Product"
   game_concept_gross_domestic_product_desc: "Total value added from urban building profits and rural raw goods produced in your owned locations."

   game_concept_location_trade_score: "Trade Score"
   game_concept_location_trade_score_desc: "Trade Score affects the assignment of local, regional, continental and world trade centers. It is affected by Market Access, Trade Advantage of location owner, amounts of Burgher Trading, Trade Capacity and Maritime Presence."

   game_concept_location_culture_score: "Culture Score"
   game_concept_location_culture_score_desc: "Culture Score affects the assignment of local, regional, continental and world culture centers. It is affected by Culture Tradition and Influence of the location owner, together with local art quality."

   game_concept_location_education_score: "Education Score"
   game_concept_location_education_score_desc: "Education Score affects the assignment of local, regional, continental and world education centers. It is affected by population of clergy and nobles, average literacy, book output, together with presence of universities, monasteries, and libraries which further boost the score."

   game_concept_location_production_score: "Production Score"
   game_concept_location_production_score_desc: "Production Score affects the assignment of local, regional, continental and world production centers. It is affected by urban manufactured goods value produced."
