l_english:
   game_concept_meiou_and_taxes: "MEIOU & Taxes"
   game_concept_meiou_and_taxes_desc: "MEIOU and Taxes is a total overhaul mod for Europa Universalis V that attempts to expand the base games systems for a deeper and more immersive experience."

   game_concept_court_maintenance_desc: "The court is the extended household of the [ruler|e], including all those who regularly attend on them. In the largest courts, this number can grow to many thousands, comprised of camarilla, household staff, clergy, gentry, bodyguards, harem, concubines, eunuchs, and many more roles. All these people do not come for free, and this figure represents the cost of having them around.\n\nIn [meiou_and_taxes|e], the money spent on $game_concept_court_maintenance$ translates to increased [demand|e] ([ShowGoodsName('furniture')], [ShowGoodsName('tools')], [ShowGoodsName('glass')] and [ShowGoodsName('fine_cloth')]) at the [market|e] where the [capital|e] is located."
   game_concept_diplomatic_maintenance_desc: "Should we ever need it, the amount of [diplomats_with_icon|e] and [diplomatic_capacity_with_icon|e] at our disposal can be increased by spending extra [gold|e].\n\nDiplomatic Spending also improves [subject_loyalty_with_icon|e].\n\nIn [meiou_and_taxes|e], 50% of the money spend on $game_concept_diplomatic_maintenance$ will be transferred to the [ShowEstateTypeName('nobles_estate')], while the rest will lead to increased [demand|e] ([ShowGoodsName('paper')] and [ShowGoodsName('jewelry')]) at the [market|e] where the [capital|e] is located."