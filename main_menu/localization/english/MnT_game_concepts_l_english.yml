l_english:
   game_concept_court_maintenance_desc: "The court is the extended household of the [ruler|e], including all those who regularly attend on them. In the largest courts, this number can grow to many thousands, comprised of camarilla, household staff, clergy, gentry, bodyguards, harem, concubines, eunuchs, and many more roles. All these people do not come for free, and this figure represents the cost of having them around. In MEIOU & Taxes, The money spent on the court translates to increased demand (Furniture, Tools, Glass and Fine Cloth) at the market where the capital is located."