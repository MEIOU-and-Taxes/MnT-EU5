 rainforest_climate_desc: "This climate embodies the pure steamy rainforest experience. Hot and drenched every month with rain that never really stops. Thick jungles overflow with towering trees, vines, and incredible animal life."
 monsoon_climate_desc: "This type of climate exemplifies the true tropical monsoon rhythm. Warm year-round, switching from dry spells to heavy seasonal rains. Dense forests flourish but open slightly during the drier times."
 savanna_winter_climate_desc: "This climate captures the essence of open tropical savanna. Always warm, featuring a dry season and a wet growing period. Vast grassy plains dotted with trees host roaming wildlife herds."
 savanna_summer_climate_desc: "This climate captures the essence of open tropical savanna. Always warm, featuring a dry season and a wet growing period. Vast grassy plains dotted with trees host roaming wildlife herds."
 hot_desert_climate_desc: "This climate typifies the intense hot desert world. Blazing heat most days and almost zero rain throughout the year. Sandy expanses, rocky ground, and super-tough cacti dominate the scene."
 cold_desert_climate_desc: "This climate illustrates the cold desert high-country feel. Hot summers turn to freezing winters with very little moisture ever. Scattered dry bushes and grasses cover these wide, barren spaces."
 hot_steppe_climate_desc: "This climate shows the hot semi-dry grassland style. Mostly hot with enough scattered rain to support grass over bare sand. Broad open plains of short grass and spiky plants suit grazing animals well."
 cold_steppe_climate_desc: "This climate depicts the chilly semi-arid steppe landscape. Warm summers meet cold winters, but rain stays limited always. Rolling short-grass fields stretch far with almost no trees around."
 mediterranean_climate_desc: "This climate embodies the classic hot-summer Mediterranean style. Hot, dry summers bake under clear skies while winters stay mild and bring most of the rain. Olive trees, vineyards, sunny hills, and drought-resistant shrubs thrive in this sunny setup."
 oceanic_mediterranean_climate_desc: "This climate exemplifies the warm-summer Mediterranean version. Mild, dry summers keep things comfortable and winters deliver gentle rain. Coastal vibes with scrubby hills, olive groves, and plants that handle dry spells well."
 subalpine_mediterranean_climate_desc: "This climate captures the rarer cool-summer Mediterranean type. Cool, dry summers pair with mild, wet winters in higher or coastal spots. Tougher shrubs and grasses cover the landscape with less intense heat."
 monsoon_humid_subtropical_climate_desc: "This climate depicts subtropical with dry winters. Hot summers bring heavy rain while winters stay mild and drier. Dense vegetation grows strong with a seasonal wet-dry flip like a mild monsoon."
 monsoon_oceanic_climate_desc: "This climate embodies subtropical with dry winters and warm summers. Warm (not scorching) summers get rain while winters are mild and drier. Greenery flourishes in this balanced, seasonally shifting setup."
 monsoon_subpolar_oceanic_climate_desc: "This climate embodies subtropical with dry winters and warm summers. Warm (not scorching) summers get rain while winters are mild and drier. Greenery flourishes in this balanced, seasonally shifting setup."
 humid_subtropical_climate_desc: "This climate typifies the hot, humid subtropical world. Steamy hot summers full of humidity and rain mix with mild winters. Thick forests, lush greenery, and fertile fields stretch across warm regions."
 oceanic_climate_desc: "This climate shows the mild marine coast pattern. Cool-to-mild temperatures year-round with steady rain and no real dry season. Evergreen forests drip with moss, ferns cover the ground, and everything stays green."
 subpolar_oceanic_climate_desc: "This climate illustrates the cooler oceanic subtype. Even cooler summers and mild winters bring frequent light rain or drizzle. Lush, misty forests of conifers and ferns hug rainy coastal areas."
 mediterranean_continental_climate_desc: "This climate typifies hot-summer dry continental with dry summers. Very hot summers turn dry while cold winters bring more moisture. Mixed forests and open lands handle big seasonal swings and summer drought."
 mediterranean_hemiboreal_climate_desc: "This climate shows warm-summer dry continental. Pleasant warm summers stay dry and winters get cold with more rain or snow. Conifers mix with broadleaf trees in areas with noticeable dry-summer influence."
 mediterranean_boreal_climate_desc: "This climate illustrates cool-summer dry continental. Short, cool summers and long cold winters feature drier summers. Sparse boreal forests or transitional zones survive the harsh, dry-summer cold."
 mediterranean_hypercontinental_climate_desc: "This climate depicts extremely cold dry-summer continental. Brutal winters plunge deep below freezing and brief summers stay dry and cool. Only the toughest conifers cling on in these remote, frozen extremes."
 monsoon_continental_climate_desc: "This climate embodies hot-summer continental with dry winters. Scorching summers contrast freezing winters that stay drier. Deciduous and mixed forests grow in regions with winter drought and big temperature shifts."
 monsoon_hemiboreal_climate_desc: "This climate exemplifies warm-summer continental with dry winters. Warm summers meet cold, drier winters with strong seasonal changes. Pines and broadleaf trees create colorful landscapes in these inland areas."
 monsoon_boreal_climate_desc: "This climate captures cool-summer continental with dry winters. Cool summers and very cold, dry winters dominate the year. Boreal conifer forests stretch across vast northern territories."
 monsoon_hypercontinental_climate_desc: "This climate typifies subarctic with dry winters and extreme cold. Short cool summers give way to deeply frozen, drier winters. Sparse taiga or tundra-like conditions prevail in the harshest zones."
 continental_climate_desc: "This climate shows the hot-summer humid continental classic. Blazing hot, humid summers crash into freezing snowy winters with rain year-round. Colorful deciduous forests and good farmland define these four-season heartlands."
 hemiboreal_climate_desc: "This climate illustrates warm-summer humid continental. Warm summers and cold, snowy winters bring steady precipitation. Mixed woods of pines and broadleaf trees shine with fall colors."
 boreal_climate_desc: "This climate depicts cool-summer humid continental or subarctic. Brief cool summers contrast long, cold winters with consistent moisture. Endless dark conifer forests blanket huge northern expanses."
 hypercontinental_climate_desc: "This climate embodies the most extreme cold humid continental. Harsh, deep-freeze winters and short cool summers rule everything. Tough, scattered conifers barely hold on in these frozen remote areas."
 andes_tundra_climate_desc: "This climate is similar to the $tundra_climate$, except that captures the excepcionality of the Andean region, where snow is uncommon below 4.500 m over the sea level."
 tundra_climate_desc: "This climate embodies the barren treeless tundra. Very brief chilly summers amid mostly frozen conditions. Mats of moss, lichens, low grasses, and small flowers hug the ground."
 polar_climate_desc: "This climate typifies the eternal polar ice cap. Constant deep freeze with virtually no melting even in summer. Thick ice and snow cover everything—no plants can grow here."