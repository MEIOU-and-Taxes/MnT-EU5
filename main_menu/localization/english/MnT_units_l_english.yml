l_english:

 a_steppe_horde: "Horse Archer Militia"
 a_steppe_horde_desc: "The Mongol and Turkic nomads would practice horseback archery from a young age, even should they no longer find themselves on the steppe. In peacetime these skills would prove very effective for hunting, and in wartime prove vital both to defend their home territory and conquer the territory of their neighbors."