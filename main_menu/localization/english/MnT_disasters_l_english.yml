#Decline of the Empire
 #Disaster
 decline_of_empire: "Time of Struggle"
 decline_of_empire_desc: "Our nation, expansive and mighty, faces new risks as it's stability declines. Corruption gnaws at the roots of our strength, radicalizing our people against their masters. Those once loyal now watch with considering eyes, weighing whether now is the time to strike. Our provinces grow restless under the weight of neglect, and foreign powers watch us, eager to carve us apart. If we do not act swiftly to address the rot within and restore ourselves, we may fade into the mist of history."
 has_not_had_decline_of_empire_last_25_years: "Has not had this [disaster|e] in the last #Y 25#! years"