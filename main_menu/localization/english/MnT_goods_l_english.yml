 mnt_credit_loan_demand_desc: "#T Loan Credit Demand#!\nOutstanding loans create demand for credit in this capital market.\n\nCalculation:\nTotal outstanding debt: #v [ROOT.GetLocation.MakeScope.GetVariable('mnt_credit_loan_total_debt').GetValue|2]#!\nBase loan-credit need: #v 1%#! of debt\nResearch divisor: #v /[ROOT.GetLocation.MakeScope.GetVariable('mnt_credit_loan_effective_divisor').GetValue|2]#!\nEffective research factor: #v [ROOT.GetLocation.MakeScope.GetVariable('mnt_credit_loan_effective_rate_percent').GetValue|4]%#! of debt\nNeeded credit value: #v [ROOT.GetLocation.MakeScope.GetVariable('mnt_credit_loan_total_debt').GetValue|2]#! * #v 1%#! / #v [ROOT.GetLocation.MakeScope.GetVariable('mnt_credit_loan_effective_divisor').GetValue|2]#! = #v [ROOT.GetLocation.MakeScope.GetVariable('mnt_credit_loan_value').GetValue|2]#!\nCredit market price: #v [ROOT.GetLocation.MakeScope.GetVariable('mnt_credit_loan_market_price').GetValue|2]#!\nFinal demand scale: #v [ROOT.GetLocation.MakeScope.GetVariable('mnt_credit_loan_value').GetValue|2]#! / #v [ROOT.GetLocation.MakeScope.GetVariable('mnt_credit_loan_market_price').GetValue|2]#! = #v [ROOT.GetLocation.MakeScope.GetVariable('mnt_credit_loan_final_scale').GetValue|2]#!"
