l_english:
 mnt_deposit_bank: "Deposit Bank"
 mnt_deposit_bank_desc: "A deposit bank accepts coin reserves and commercial paper, expanding the supply of transferable bank credit for merchants and borrowers."
 mnt_public_exchange_bank: "Public Exchange Bank"
 mnt_public_exchange_bank_desc: "A public exchange bank stabilizes payments across currencies and turns merchant deposits into more reliable bank money."
 mnt_joint_stock_bank: "Joint-Stock Bank"
 mnt_joint_stock_bank_desc: "A joint-stock bank pools private capital, public debt, and commercial credit into a larger financial institution."
 mnt_clearing_bank: "Clearing Bank"
 mnt_clearing_bank_desc: "A clearing bank settles obligations through ledgers and deposits, creating broad credit with only limited metal reserves."
 mnt_burgher_banking_office: "Burgher Banking House"
 mnt_burgher_banking_office_desc: "Urban financiers and merchant families provide local credit outside direct state control, increasing burgher influence."
 mnt_burgher_deposit_bank: "Burgher Deposit Bank"
 mnt_burgher_deposit_bank_desc: "Burgher bankers use deposits and commercial paper to support trade and lending."
 mnt_burgher_public_exchange_bank: "Burgher Exchange Bank"
 mnt_burgher_public_exchange_bank_desc: "A burgher-run exchange bank clears merchant payments and supports private credit markets."
 mnt_burgher_joint_stock_bank: "Burgher Joint-Stock Bank"
 mnt_burgher_joint_stock_bank_desc: "Urban investors organize joint-stock finance, expanding credit while strengthening burgher power."
 mnt_burgher_clearing_bank: "Burgher Clearing Bank"
 mnt_burgher_clearing_bank_desc: "A mature burgher clearing bank settles payments through deposits and ledgers with minimal metal backing."
