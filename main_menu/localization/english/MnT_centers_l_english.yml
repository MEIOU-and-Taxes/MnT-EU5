l_english:
 STATIC_MODIFIER_NAME_mnt_center_trade_local:0 "Local Trade Center"
 STATIC_MODIFIER_DESC_mnt_center_trade_local:0 "Awarded yearly to the highest-scoring location in each area that reaches at least 4 trade points.\n\nA bustling fairground anchors merchants from nearby villages, keeping coin and contracts flowing through this location."
 STATIC_MODIFIER_NAME_mnt_center_trade_regional:0 "Regional Trade Center"
 STATIC_MODIFIER_DESC_mnt_center_trade_regional:0 "Assigned each year to the regional leader that clears 10 trade points and lacks continental or world status.\n\nWarehouses and counting houses coordinate caravans across the region, drawing burgher families seeking steady opportunities."
 STATIC_MODIFIER_NAME_mnt_center_trade_continental:0 "Continental Trade Center"
 STATIC_MODIFIER_DESC_mnt_center_trade_continental:0 "Each continent crowns one city per year if it hits 18 trade points and no world trade center sits there.\n\nThe city mediates commerce between distant basins, with entrenched guilds and maritime brokers safeguarding its supremacy."
 STATIC_MODIFIER_NAME_mnt_center_trade_world:0 "World Trade Center"
 STATIC_MODIFIER_DESC_mnt_center_trade_world:0 "After the Age of Absolutism, the yearly global recalculation grants this to the top trade location with 30+ score.\n\nGlobal convoys converge here, and every dockside whisper can sway fortunes across oceans."

 STATIC_MODIFIER_NAME_mnt_center_production_local:0 "Local Production Center"
 STATIC_MODIFIER_DESC_mnt_center_production_local:0 "Selected yearly for the area leader once it reaches 5 production score.\n\nWorkshops and artisans fill its courtyards, producing durable goods for the surrounding hinterland."
 STATIC_MODIFIER_NAME_mnt_center_production_regional:0 "Regional Production Center"
 STATIC_MODIFIER_DESC_mnt_center_production_regional:0 "Regions bestow this on their top site with 12+ production score unless a continental or world center is already present.\n\nGuild consortiums coordinate supply chains that span multiple markets, letting craftsmen specialize and reinvest."
 STATIC_MODIFIER_NAME_mnt_center_production_continental:0 "Continental Production Center"
 STATIC_MODIFIER_DESC_mnt_center_production_continental:0 "Each continent can host one city per year if it clears 20 production score and does not already house the world center.\n\nIndustrial patrons bankroll manufactories whose techniques are copied far beyond the province."
 STATIC_MODIFIER_NAME_mnt_center_production_world:0 "World Production Center"
 STATIC_MODIFIER_DESC_mnt_center_production_world:0 "Post-Absolutism, the global recalculation hands this to the single highest production city with 32+ score.\n\nThis metropolis defines benchmark prices for premium manufactures, and investors everywhere chase its innovations."

 STATIC_MODIFIER_NAME_mnt_center_culture_local:0 "Local Cultural Center"
 STATIC_MODIFIER_DESC_mnt_center_culture_local:0 "Granted yearly to the area exemplar once it reaches 3 culture score.\n\nCommunity festivals, patron saints, and playwrights keep the town's customs vibrant and distinctive."
 STATIC_MODIFIER_NAME_mnt_center_culture_regional:0 "Regional Cultural Center"
 STATIC_MODIFIER_DESC_mnt_center_culture_regional:0 "Regions grant it to their foremost city with 8+ culture score unless a continental or world center exists there.\n\nTraveling troubadours, ateliers, and courts make this city the arbiter of taste for neighboring lands."
 STATIC_MODIFIER_NAME_mnt_center_culture_continental:0 "Continental Cultural Center"
 STATIC_MODIFIER_DESC_mnt_center_culture_continental:0 "Continents crown one site per year that surpasses 14 culture score so long as no world cultural center is present.\n\nIts academies and patrons export refined etiquette and iconography across entire cultural spheres."
 STATIC_MODIFIER_NAME_mnt_center_culture_world:0 "World Cultural Center"
 STATIC_MODIFIER_DESC_mnt_center_culture_world:0 "After the Age of Absolutism, the yearly global tally elevates the top culture metropolis with 24+ score to world status.\n\nPilgrims, artists, and philosophers journey here to absorb styles that soon dominate the known world."

 STATIC_MODIFIER_NAME_mnt_center_education_local:0 "Local Education Center"
 STATIC_MODIFIER_DESC_mnt_center_education_local:0 "Chosen annually for the area's leading scholar city once it surpasses 3 education score.\n\nParish schools and guild tutors raise baseline literacy for tradespeople and clergy alike."
 STATIC_MODIFIER_NAME_mnt_center_education_regional:0 "Regional Education Center"
 STATIC_MODIFIER_DESC_mnt_center_education_regional:0 "Regions award it to their premier campus with at least 8 education score unless a continental or world center already exists.\n\nLibraries, seminaries, and patron-funded chairs attract students from across the region."
 STATIC_MODIFIER_NAME_mnt_center_education_continental:0 "Continental Education Center"
 STATIC_MODIFIER_DESC_mnt_center_education_continental:0 "Each continent grants it to a city exceeding 14 education score provided no world education center occupies it.\n\nUniversities boasting foreign faculties debate the cutting edge of theology, law, and natural philosophy."
 STATIC_MODIFIER_NAME_mnt_center_education_world:0 "World Education Center"
 STATIC_MODIFIER_DESC_mnt_center_education_world:0 "Following the Age of Absolutism, the yearly global check elevates the lone location with 24+ education score to lead world scholarship.\n\nThe city's institutions set the curriculum for ambitious courts everywhere, pairing storied archives with relentless intellectual exchange."
