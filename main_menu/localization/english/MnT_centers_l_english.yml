l_english:
 STATIC_MODIFIER_NAME_mnt_center_trade_local:0 "Local Trade Center"
 STATIC_MODIFIER_DESC_mnt_center_trade_local:0 "Awarded yearly to the highest-scoring location in each area once it surpasses trade the score threshold.\n\nA bustling fairground anchors merchants from nearby villages, keeping coin and contracts flowing through this location.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of trade centers and sources of their [location_trade_score|e]."
 STATIC_MODIFIER_NAME_mnt_center_trade_regional:0 "Regional Trade Center"
 STATIC_MODIFIER_DESC_mnt_center_trade_regional:0 "Assigned each year to the regional leader that clears trade the score threshold and lacks continental or world status.\n\nWarehouses and counting houses coordinate caravans across the region, drawing burgher families seeking steady opportunities.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of trade centers and sources of their [location_trade_score|e]."
 STATIC_MODIFIER_NAME_mnt_center_trade_continental:0 "Continental Trade Center"
 STATIC_MODIFIER_DESC_mnt_center_trade_continental:0 "Each continent crowns one city per year if it clears trade the score threshold and no world trade center sits there.\n\nThe city mediates commerce between distant basins, with entrenched guilds and maritime brokers safeguarding its supremacy.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of trade centers and sources of their [location_trade_score|e]."
 STATIC_MODIFIER_NAME_mnt_center_trade_world:0 "World Trade Center"
 STATIC_MODIFIER_DESC_mnt_center_trade_world:0 "After the Age of Absolutism, the yearly global recalculation grants this to the top trade location.\n\nGlobal convoys converge here, and every dockside whisper can sway fortunes across oceans.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of trade centers and sources of their [location_trade_score|e]."

 STATIC_MODIFIER_NAME_mnt_center_production_local:0 "Local Production Center"
 STATIC_MODIFIER_DESC_mnt_center_production_local:0 "Selected yearly for the area leader once it surpasses production the score threshold.\n\nWorkshops and artisans fill its courtyards, producing durable goods for the surrounding hinterland.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of production centers and sources of their [location_production_score|e]."
 STATIC_MODIFIER_NAME_mnt_center_production_regional:0 "Regional Production Center"
 STATIC_MODIFIER_DESC_mnt_center_production_regional:0 "Regions bestow this on their top site once it surpasses production the score threshold unless a continental or world center is already present.\n\nGuild consortiums coordinate supply chains that span multiple markets, letting craftsmen specialize and reinvest.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of production centers and sources of their [location_production_score|e]."
 STATIC_MODIFIER_NAME_mnt_center_production_continental:0 "Continental Production Center"
 STATIC_MODIFIER_DESC_mnt_center_production_continental:0 "Each continent can host one city per year if it clears production the score threshold and does not already house the world center.\n\nIndustrial patrons bankroll manufactories whose techniques are copied far beyond the province.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of production centers and sources of their [location_production_score|e]."
 STATIC_MODIFIER_NAME_mnt_center_production_world:0 "World Production Center"
 STATIC_MODIFIER_DESC_mnt_center_production_world:0 "Following the Age of Absolutism, the global recalculation hands this to the single highest production city.\n\nThis metropolis defines benchmark prices for premium manufactures, and investors everywhere chase its innovations.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of production centers and sources of their [location_production_score|e]."

 STATIC_MODIFIER_NAME_mnt_center_culture_local:0 "Local Cultural Center"
 STATIC_MODIFIER_DESC_mnt_center_culture_local:0 "Granted yearly to the area exemplar once it surpasses culture the score threshold.\n\nCommunity festivals, patron saints, and playwrights keep the town's customs vibrant and distinctive.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of culture centers and sources of their [location_culture_score|e]."
 STATIC_MODIFIER_NAME_mnt_center_culture_regional:0 "Regional Cultural Center"
 STATIC_MODIFIER_DESC_mnt_center_culture_regional:0 "Regions grant it to their foremost city once it surpasses culture the score threshold unless a continental or world center exists there.\n\nTraveling troubadours, ateliers, and courts make this city the arbiter of taste for neighboring lands.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of culture centers and sources of their [location_culture_score|e]."
 STATIC_MODIFIER_NAME_mnt_center_culture_continental:0 "Continental Cultural Center"
 STATIC_MODIFIER_DESC_mnt_center_culture_continental:0 "Continents crown one site per year that surpasses culture the score threshold, so long as no world cultural center is present.\n\nIts academies and patrons export refined etiquette and iconography across entire cultural spheres.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of culture centers and sources of their [location_culture_score|e]."
 STATIC_MODIFIER_NAME_mnt_center_culture_world:0 "World Cultural Center"
 STATIC_MODIFIER_DESC_mnt_center_culture_world:0 "After the Age of Absolutism, the yearly global tally elevates the top culture metropolis to world status.\n\nPilgrims, artists, and philosophers journey here to absorb styles that soon dominate the known world.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of culture centers and sources of their [location_culture_score|e]."

 STATIC_MODIFIER_NAME_mnt_center_education_local:0 "Local Education Center"
 STATIC_MODIFIER_DESC_mnt_center_education_local:0 "Chosen annually for the area's leading scholar city once it surpasses education the score threshold.\n\nParish schools and guild tutors raise baseline literacy for tradespeople and clergy alike.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of education centers and sources of their [location_education_score|e]."
 STATIC_MODIFIER_NAME_mnt_center_education_regional:0 "Regional Education Center"
 STATIC_MODIFIER_DESC_mnt_center_education_regional:0 "Chosen annually for the region's leading scholar city once it surpasses education the score threshold, unless a continental or world center already exists.\n\nLibraries, seminaries, and patron-funded chairs attract students from across the region.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of education centers and sources of their [location_education_score|e]."
 STATIC_MODIFIER_NAME_mnt_center_education_continental:0 "Continental Education Center"
 STATIC_MODIFIER_DESC_mnt_center_education_continental:0 "Chosen annually for the continent's leading scholar city once it surpasses education the score threshold, provided no world education center occupies it.\n\nUniversities boasting foreign faculties debate the cutting edge of theology, law, and natural philosophy.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of education centers and sources of their [location_education_score|e]."
 STATIC_MODIFIER_NAME_mnt_center_education_world:0 "World Education Center"
 STATIC_MODIFIER_DESC_mnt_center_education_world:0 "Following the Age of Absolutism, the yearly global check elevates the lone location with highest education score to lead world scholarship.\n\nThe city's institutions set the curriculum for ambitious courts everywhere, pairing storied archives with relentless intellectual exchange.\n\n[meiou_and_taxes|e] includes dedicated mapmode presenting location of education centers and sources of their [location_education_score|e]."
