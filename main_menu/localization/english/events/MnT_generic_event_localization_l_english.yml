l_english:
  hidden_event.t: "Hidden Event"
  hidden_event.d: "This is a hidden event that shouldn't ever be visible to the player. If you are seeing this, please report it as a bug."
  mnt_information.1.title: "MEIOU & Taxes"
  mnt_information.1.desc: "Welcome to MEIOU & Taxes! This is a total overhaul mod for Europa Universalis V that aspires to expand and deepen the systems of the base game to bring a more immersive and grounded experience.\n\nThis event is a one-time popup at the start of the game which serves to inform the player that the mod has loaded and to give some basic information.\n\nA few notes:\n - We removed RGOs in favor of [rgo_building|e]s\n - There are no slaves at game-start until we find a nicer way to correct Vanilla's mass enslsavement of pops of the wrong religions\n - Don't be suprised if you make a  lot less money than without this mod. We have slowed down the economic game a lot.\n\nFor more information or to report issues, please join our community server on Discord at discord.gg/meiouandtaxes. Our team is small and cannot be everywhere, so if you want to report something or find help, Discord is where we are.\n\nBrought to you with love by the MEIOU & Taxes Team. Enjoy!"
  mnt_information.1.opta: "Let's go!"